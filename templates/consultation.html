{% extends "base-only-header-footer.html" %}
{% load static %}
{% block body %}
	<section id="singUpConsultation">
    <div class="container">
        <div class="singUpConsultation">
            <form action="{% url 'consultation' %}" method="POST" class="singUpConsultation__form">
                {% csrf_token %}                
                <div class="title">Запись на консультацию</div>		                
                <input type="text" name="name" class="order__form_input" placeholder="Введите Имя" required>
                <input type="tel" name="phone" class="order__form_input" placeholder="+ 7 (999) 000 00 00" required>                
                <div class="chekbox fic">
                    <input type="checkbox" name="agreement" class="singUpConsultation__ckekbox" checked required>
                    <span class="chekbox__intro">Я согласен(а) с политикой конфидециоальности</span>
                </div>
                <button type="submit" class="btn singUpConsultation__form_btn">
                    Отправить
                </button>
            </form>
            <div class="blockImgHiden"></div>
        </div>
    </div>
    <img src="{% static 'img/singUpConsultationImg.jpg' %}" alt="singUpConsultationImg" class="singUpConsultation__img">
</section>
{% if messages %}
			 <script>
				{% for message in messages %}
					{% if message.tags == 'success' %}
						alert("✅ {{ message }}");
					{% elif message.tags == 'error' %}
						alert("❌ {{ message }}");
					{% else %}
						alert("{{ message }}");
					{% endif %}
				{% endfor %}
			</script>
{% endif %}
{% endblock body %}
