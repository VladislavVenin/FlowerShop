{% extends "base.html" %}
{% load static %}
{% block body %}
<section id="paymentResult" style="min-height: 60vh;">
    <div class="container p100">
        <div class="paymentResult__content" style="text-align: center; max-width: 600px; margin: 0 auto;">
            <div class="paymentResult__icon" style="margin-bottom: 30px;">
                <span style="font-size: 80px; color: #17CF97;">✓</span>
            </div>
            
            <h1 class="title" style="margin-bottom: 20px;">Заказ успешно оплачен!</h1>
            
            <p style="font-size: 18px; line-height: 1.5; color: #2D2D2D; margin-bottom: 40px;">
                Спасибо за ваш заказ. Наш менеджер свяжется с вами в ближайшее время для подтверждения доставки.
            </p>
            
            <button class="btn" onclick="window.location.href='{% url 'index' %}';" 
                    style="width: 250px; height: 57px; font-size: 16px;">
                Вернуться на главную
            </button>
        </div>
    </div>
</section>
{% endblock %}

{% block consult %}
{% endblock %}
