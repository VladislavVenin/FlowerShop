{% extends "base-only-header.html" %}
{% load static %}
{% block body %}
	<section id="quiz">
		<div class="container">
			<div class="quiz">
				<div class="quiz__back ">
					<a href="javascript:history.back()" class="quiz__back_link fic">
						<img src="{% static 'img/arrow-left.svg' %}" alt="Назад" class="arrowLeft">
					<span class="quiz__back_intro">Назад</span></a>
				</div>
				<form action="{% url 'quiz_step' %}" method="post" class="quiz__block">
                    {% csrf_token %}
					<h1 class="quiz__title">На какой бюджет рассчитываете?</h1>
					<div class="quiz__elems fic">
						<button class="quiz__elem" type="submit" name="price" value="1">До 1 000 руб</button>
						<button class="quiz__elem" type="submit" name="price" value="2">1 000 - 5 000 руб</button>
						<button class="quiz__elem" type="submit" name="price" value="3">от 5 000 руб</button>
						<button class="quiz__elem" type="submit" name="price" value="4">Не имеет значения</button>
					</div>
					<div class="quiz__progress">
						<div class="quiz__progress_step">
							<span class="quiz__progress_num">2</span>
							<span class="quiz__progress_in"> шаг из </span>
							<span class="quiz__progress_num">2</span>
						</div>
						<div class="quiz__progress_line">
							<div class="quiz__progress_lineActive" style="width:1220px"></div>
						</div>
					</div>
				</form>

			</div>
		</div>
	</section>
{% endblock body %}
